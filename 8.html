<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generatore Verbale Fotografico</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;}
  body{
    background:#eef1f4;
    font-family:'Inter', system-ui, sans-serif;
    margin:0;
    padding:20px;
    color:#182430;
  }
  .wrap{max-width:920px; margin:0 auto;}
  .panel{
    background:#fff;
    border:1px solid #dde3e9;
    border-radius:4px;
    padding:22px;
    margin-bottom:20px;
  }
  .panel-title{
    font-weight:600;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:#003b70;
    margin:0 0 18px;
  }
  .btn{
    background:#f4f6f8;
    border:1px solid #dde3e9;
    padding:14px;
    border-radius:4px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .btn.primary{
    background:#00549e;
    color:#fff;
    border-color:#00549e;
  }
  .btn.primary:hover{background:#003b70;}
  .btn.primary:disabled{
    background:#a9c2d8;
    cursor:not-allowed;
  }
  .btn.danger{
    background:#e2001a;
    color:#fff;
    border-color:#e2001a;
  }
  .btn.danger:hover{background:#b80014;}
  .btn.danger:disabled{
    background:#f0b4bc;
    cursor:not-allowed;
  }
  .capture-buttons{display:flex; gap:10px; margin-bottom:16px;}
  .btn{flex:1; justify-content:center;}
  #cameraInput,#fileInput{display:none;}
  
  .thumbs{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(76px,1fr));
    gap:8px;
  }
  .thumb{
    position:relative;
    aspect-ratio:1;
    border:1px solid #dde3e9;
    border-radius:4px;
    overflow:hidden;
    background:#f4f6f8;
  }
  .thumb img{width:100%; height:100%; object-fit:cover;}
  .thumb .rm{
    position:absolute; top:2px; right:2px;
    width:20px; height:20px;
    background:rgba(255,255,255,0.92);
    border:1px solid #dde3e9;
    border-radius:2px;
    cursor:pointer;
    text-align:center;
    font-size:13px;
    line-height:18px;
  }
  .thumb .rm:hover{border-color:#e2001a; color:#e2001a;}
  .thumb .num{
    position:absolute; bottom:2px; left:2px;
    font-size:9px;
    background:rgba(255,255,255,0.92);
    padding:1px 4px;
    border-radius:2px;
  }
  .thumb .crop-badge{
    position:absolute; top:2px; left:2px;
    font-size:7px;
    background:rgba(0,84,158,0.85);
    color:#fff;
    padding:1px 4px;
    border-radius:2px;
  }
  .empty-note{
    font-size:12px;
    color:#667384;
    padding:20px;
    text-align:center;
    border:1px dashed #dde3e9;
    border-radius:4px;
  }
  label{
    display:block;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    color:#667384;
    margin-bottom:6px;
  }
  .field{margin-bottom:16px;}
  input[type=text], input[type=date]{
    width:100%;
    background:#f4f6f8;
    border:1px solid #dde3e9;
    border-radius:4px;
    font-size:14px;
    padding:11px 12px;
    outline:none;
  }
  input[type=text]:focus, input[type=date]:focus{
    border-color:#00549e;
    box-shadow:0 0 0 3px rgba(0,84,158,0.12);
  }
  .radio-group{
    display:flex;
    gap:24px;
    margin-bottom:16px;
  }
  .radio-group label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:500;
    text-transform:none;
    color:#182430;
    cursor:pointer;
  }
  .radio-group input[type="radio"]{
    width:18px; height:18px;
    accent-color:#00549e;
    cursor:pointer;
  }
  .tag{
    margin-top:22px;
    border:1px solid #dde3e9;
    border-radius:4px;
    background:#e8f1fa;
    padding:14px 16px 14px 22px;
    position:relative;
  }
  .tag::before{
    content:'';
    position:absolute;
    left:0; top:0; bottom:0;
    width:6px;
    background:repeating-linear-gradient(-45deg, #00549e 0 4px, #e2001a 4px 8px);
    border-radius:4px 0 0 4px;
  }
  .tag-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:#003b70;
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .tag-name{
    font-family:monospace;
    font-size:13px;
    word-break:break-all;
    line-height:1.6;
  }
  .tag-name .seg{color:#667384;}
  .tag-name .val{color:#003b70; font-weight:600;}
  .tag-name .miss{color:#e2001a;}
  .filename-row{
    display:flex;
    gap:10px;
    align-items:center;
    margin-top:16px;
    flex-wrap:wrap;
  }
  .filename-row .field{flex:1; min-width:200px; margin-bottom:0;}
  .filename-row .btn{flex:0 0 auto; padding:11px 16px; font-size:12px;}
  .generate-row .btn{width:100%;}
  .status{
    margin-top:10px;
    font-size:12px;
    color:#667384;
    min-height:16px;
  }
  .status.ok{color:#1e8e5a;}
  .status.error{color:#d1293b;}
  footer{
    max-width:920px;
    margin:14px auto 0;
    font-size:11px;
    color:#667384;
    text-align:center;
  }
  .debug-info{
    font-size:10px;
    color:#667384;
    margin-top:5px;
    font-family:monospace;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <h1 style="font-size:22px; margin:0;">dormakaba<span style="color:#e2001a;">.</span></h1>
        <h2 style="font-size:16px; margin:0;">Verbale Fotografico</h2>
      </div>
      <div style="font-family:monospace; font-size:11px; color:#667384;">MODULO <b>VA</b></div>
    </div>
  </div>

  <!-- FOTO -->
  <div class="panel">
    <div class="panel-title">Foto verbale</div>
    <div class="capture-buttons">
      <button class="btn primary" id="btnCamera">📷 Scatta foto</button>
      <button class="btn" id="btnUpload">📤 Carica foto</button>
    </div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div id="thumbWrap"><div class="empty-note">Nessuna foto aggiunta</div></div>
    <div class="debug-info" id="debugInfo"></div>
  </div>

  <!-- DATI -->
  <div class="panel">
    <div class="panel-title">Dati intervento</div>
    
    <div class="radio-group">
      <label><input type="radio" name="docType" value="CO" checked> CO (Contratto Ordine)</label>
      <label><input type="radio" name="docType" value="CM"> CM (Contratto Manutenzione)</label>
    </div>

    <div class="field">
      <label for="cliente">Cliente</label>
      <input type="text" id="cliente" placeholder="es. ROSSI SPA" value="ROSSI">
    </div>
    <div class="field">
      <label for="co">Numero ordine (CO)</label>
      <input type="text" id="co" placeholder="es. 1300123456" value="1300123456">
    </div>
    <div class="field">
      <label for="tecnico">Cognome tecnico</label>
      <input type="text" id="tecnico" placeholder="es. BIANCHI" value="BIANCHI">
    </div>
    <div class="field">
      <label for="data">Data intervento</label>
      <input type="date" id="data">
    </div>

    <div class="filename-row">
      <div class="field">
        <label for="filenameManual">Nome file PDF</label>
        <input type="text" id="filenameManual" placeholder="Generato automaticamente">
      </div>
      <button class="btn" id="btnRegenerate">🔄 Rigenera</button>
    </div>

    <div class="tag">
      <div class="tag-label"><span>Anteprima nome file</span><span id="tagStatus">⏳ INCOMPLETO</span></div>
      <div class="tag-name" id="tagName">…</div>
    </div>
  </div>

  <!-- GENERA -->
  <div class="panel generate-row">
    <button class="btn danger" id="btnGenerate" disabled>📄 Genera PDF</button>
    <div class="status" id="status">✅ Pronto per iniziare</div>
  </div>

</div>

<footer>Elaborazione locale nel browser · nessuna foto viene caricata su server esterni</footer>

<script>
(function(){
  // ============================================================
  // STATO
  // ============================================================
  const state = { images: [] };
  let manualOverride = false;
  let isGenerating = false;
  let lastAutoFilename = null;

  // ============================================================
  // DOM
  // ============================================================
  const $ = id => document.getElementById(id);
  const cliente = $('cliente');
  const co = $('co');
  const tecnico = $('tecnico');
  const data = $('data');
  const docTypeRadios = document.querySelectorAll('input[name="docType"]');
  const filenameManual = $('filenameManual');
  const tagName = $('tagName');
  const tagStatus = $('tagStatus');
  const thumbWrap = $('thumbWrap');
  const btnGenerate = $('btnGenerate');
  const statusEl = $('status');
  const debugInfo = $('debugInfo');

  // ============================================================
  // DATA DEFAULT
  // ============================================================
  function todayStr() {
    const d = new Date();
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  data.value = todayStr();

  // ============================================================
  // FUNZIONE RITAGLIO BORDI - ROBUSTA
  // ============================================================
  function cropImageAuto(dataUrl) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = function() {
        try {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          const w = canvas.width;
          const h = canvas.height;
          
          let minX = w, maxX = 0, minY = h, maxY = 0;
          const threshold = 25;
          
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              const idx = (y * w + x) * 4;
              const gray = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
              if (gray < 255 - threshold) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
              }
            }
          }
          
          if (maxX === 0 && maxY === 0) {
            resolve({ dataUrl: dataUrl, cropped: false });
            return;
          }
          
          const pad = 5;
          const x = Math.max(0, minX - pad);
          const y = Math.max(0, minY - pad);
          const cropW = Math.min(w - x, maxX - minX + 1 + pad * 2);
          const cropH = Math.min(h - y, maxY - minY + 1 + pad * 2);
          
          const cropCanvas = document.createElement('canvas');
          cropCanvas.width = cropW;
          cropCanvas.height = cropH;
          const cropCtx = cropCanvas.getContext('2d');
          cropCtx.drawImage(canvas, x, y, cropW, cropH, 0, 0, cropW, cropH);
          
          resolve({ dataUrl: cropCanvas.toDataURL('image/jpeg', 0.85), cropped: true });
        } catch(e) {
          resolve({ dataUrl: dataUrl, cropped: false });
        }
      };
      img.onerror = function() {
        resolve({ dataUrl: dataUrl, cropped: false });
      };
      img.src = dataUrl;
    });
  }

  // ============================================================
  // COMPRESSIONE IMMAGINE
  // ============================================================
  function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          let width = img.width;
          let height = img.height;
          const MAX = 1600;
          if(width > MAX || height > MAX) {
            const scale = MAX / Math.max(width, height);
            width = Math.round(width * scale);
            height = Math.round(height * scale);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.onerror = function() {
          reject(new Error('Immagine non valida'));
        };
        img.src = e.target.result;
      };
      reader.onerror = function() {
        reject(new Error('Lettura file fallita'));
      };
      reader.readAsDataURL(file);
    });
  }

  // ============================================================
  // HANDLE FILES
  // ============================================================
  async function handleFiles(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if(files.length === 0) {
      statusEl.textContent = '⚠️ Nessun file immagine valido';
      statusEl.className = 'status error';
      return;
    }

    for(const file of files) {
      try {
        statusEl.textContent = `📷 Elaborazione: ${file.name}...`;
        statusEl.className = 'status';
        debugInfo.textContent = `🔄 Elaborazione: ${file.name}`;
        
        const compressed = await compressImage(file);
        const result = await cropImageAuto(compressed);
        
        state.images.push({
          id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
          dataUrl: result.dataUrl,
          isCropped: result.cropped
        });
        
        renderThumbs();
        refreshGenerateState();
        statusEl.textContent = `✅ ${file.name} ${result.cropped ? '✂️ ritagliata' : ''}`;
        statusEl.className = 'status ok';
        debugInfo.textContent = `✅ Caricata: ${file.name} (${result.cropped ? 'ritagliata' : 'originale'})`;
        
      } catch(err) {
        statusEl.textContent = `❌ Errore: ${file.name}`;
        statusEl.className = 'status error';
        debugInfo.textContent = `❌ Errore: ${file.name} - ${err.message}`;
      }
    }
  }

  // ============================================================
  // EVENTI CAMERA/UPLOAD
  // ============================================================
  document.getElementById('btnCamera').addEventListener('click', () => $('cameraInput').click());
  document.getElementById('btnUpload').addEventListener('click', () => $('fileInput').click());

  $('cameraInput').addEventListener('change', function() {
    if(this.files && this.files.length > 0) {
      handleFiles(this.files);
    }
    this.value = '';
  });

  $('fileInput').addEventListener('change', function() {
    if(this.files && this.files.length > 0) {
      handleFiles(this.files);
    }
    this.value = '';
  });

  // ============================================================
  // SANITIZZAZIONE
  // ============================================================
  function sanitize(str) {
    return (str || '')
      .toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^A-Z0-9]+/g, '')
      .trim();
  }

  function formatDate(isoStr) {
    if(!isoStr) return null;
    const [y,m,d] = isoStr.split('-');
    return `${d}.${m}.${y}`;
  }

  function getDocType() {
    for(const r of docTypeRadios) {
      if(r.checked) return r.value;
    }
    return 'CO';
  }

  // ============================================================
  // COSTRUZIONE NOME FILE
  // ============================================================
  function buildFilename() {
    const c = sanitize(cliente.value);
    const coVal = sanitize(co.value);
    const t = sanitize(tecnico.value);
    const dOk = formatDate(data.value);
    const docType = getDocType();
    const prefix = docType === 'CO' ? 'VA' : 'VM';

    const allValid = c.length > 0 && coVal.length > 0 && t.length > 0 && dOk;

    let html = '';
    const parts = [
      { value: prefix, valid: true },
      { value: c, valid: c.length > 0, label: 'CLIENTE' },
      { value: 'CO', valid: true },
      { value: coVal, valid: coVal.length > 0, label: 'ORDINE' },
      { value: t, valid: t.length > 0, label: 'TECNICO' },
      { value: dOk, valid: !!dOk, label: 'DATA' }
    ];
    
    parts.forEach((p, i) => {
      if(i > 0) html += '<span class="seg">_</span>';
      html += p.value
        ? `<span class="val">${p.value}</span>`
        : `<span class="miss">${p.label || '?'}</span>`;
    });
    html += '<span class="seg">.pdf</span>';
    tagName.innerHTML = html;

    const manual = filenameManual.value.trim();
    
    if (allValid) {
      lastAutoFilename = `${prefix}_${c}_CO_${coVal}_${t}_${dOk}.pdf`;
    } else {
      lastAutoFilename = null;
    }

    const finalFilename = (manualOverride && manual.length > 0) ? manual : lastAutoFilename;

    tagStatus.textContent = finalFilename ? '✅ PRONTO' : '⏳ INCOMPLETO';
    tagStatus.style.color = finalFilename ? '#1e8e5a' : '#d1293b';

    return { filename: finalFilename, allValid };
  }

  function refreshGenerateState() {
    const { filename, allValid } = buildFilename();
    const hasPhotos = state.images.length > 0;
    btnGenerate.disabled = isGenerating || !(allValid && hasPhotos && filename);
    return { filename, allValid, hasPhotos };
  }

  function updateManualFromAuto() {
    if (!manualOverride && lastAutoFilename) {
      filenameManual.value = lastAutoFilename;
    }
  }

  function onDataChange() {
    buildFilename();
    if (!manualOverride) {
      filenameManual.value = lastAutoFilename || '';
    }
    refreshGenerateState();
  }

  // ============================================================
  // EVENTI DATI
  // ============================================================
  [cliente, co, tecnico, data].forEach(el => {
    el.addEventListener('input', onDataChange);
    el.addEventListener('change', onDataChange);
  });

  docTypeRadios.forEach(r => {
    r.addEventListener('change', onDataChange);
  });

  filenameManual.addEventListener('input', function() {
    manualOverride = true;
    buildFilename();
    refreshGenerateState();
  });

  document.getElementById('btnRegenerate').addEventListener('click', function() {
    manualOverride = false;
    onDataChange();
  });

  // ============================================================
  // RENDER MINIATURE
  // ============================================================
  function renderThumbs() {
    if(state.images.length === 0) {
      thumbWrap.innerHTML = '<div class="empty-note">Nessuna foto aggiunta</div>';
      return;
    }
    
    let html = '<div class="thumbs">';
    state.images.forEach((img, i) => {
      html += `
        <div class="thumb">
          <img src="${img.dataUrl}" alt="foto ${i+1}">
          <span class="num">${i+1}</span>
          ${img.isCropped ? '<span class="crop-badge">✂️</span>' : ''}
          <span class="rm" data-id="${img.id}">&times;</span>
        </div>
      `;
    });
    html += '</div>';
    thumbWrap.innerHTML = html;

    thumbWrap.querySelectorAll('.rm').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.getAttribute('data-id');
        state.images = state.images.filter(img => String(img.id) !== id);
        renderThumbs();
        refreshGenerateState();
        statusEl.textContent = '🗑️ Foto rimossa';
        statusEl.className = 'status';
        debugInfo.textContent = `🗑️ Foto rimossa. ${state.images.length} rimanenti.`;
      });
    });
  }

  // ============================================================
  // GENERAZIONE PDF
  // ============================================================
  btnGenerate.addEventListener('click', async function() {
    if(isGenerating) return;
    
    const { filename, allValid } = buildFilename();
    
    if(!allValid) {
      statusEl.textContent = '⚠️ Compila tutti i campi';
      statusEl.className = 'status error';
      return;
    }
    
    if(state.images.length === 0) {
      statusEl.textContent = '⚠️ Aggiungi almeno una foto';
      statusEl.className = 'status error';
      return;
    }
    
    if(!filename) {
      statusEl.textContent = '⚠️ Nome file non valido';
      statusEl.className = 'status error';
      return;
    }

    isGenerating = true;
    this.disabled = true;
    statusEl.textContent = '📄 Generazione PDF...';
    statusEl.className = 'status';
    debugInfo.textContent = `📄 Generazione PDF: ${filename}`;

    try {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const margin = 10;

      for(let i = 0; i < state.images.length; i++) {
        if(i > 0) pdf.addPage();
        
        const imgData = state.images[i].dataUrl;
        
        const dims = await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve({ w: img.width, h: img.height });
          img.src = imgData;
        });
        
        const maxW = pageW - margin * 2;
        const maxH = pageH - margin * 2;
        let w = maxW;
        let h = (dims.h / dims.w) * w;
        if(h > maxH) { h = maxH; w = (dims.w / dims.h) * h; }
        
        pdf.addImage(imgData, 'JPEG', (pageW - w)/2, (pageH - h)/2, w, h);
      }

      // DOWNLOAD AUTOMATICO
      pdf.save(filename);
      
      statusEl.textContent = `✅ PDF scaricato: ${filename}`;
      statusEl.className = 'status ok';
      debugInfo.textContent = `✅ Download completato: ${filename}`;
      
    } catch(err) {
      statusEl.textContent = `❌ Errore: ${err.message}`;
      statusEl.className = 'status error';
      debugInfo.textContent = `❌ Errore: ${err.message}`;
    } finally {
      isGenerating = false;
      this.disabled = false;
      refreshGenerateState();
    }
  });

  // ============================================================
  // INIZIALIZZAZIONE
  // ============================================================
  onDataChange();
  statusEl.textContent = '✅ Pronto per iniziare';
  statusEl.className = 'status ok';
  debugInfo.textContent = '✅ Inizializzato. Carica una foto per iniziare.';

})();
</script>
</body>
</html>
