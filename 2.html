
<div class="brandbar"></div>
<div class="wrap">

  <header>
    <div class="brand">
      
      <span class="logo-mark">dormakaba<span class="dot">.</span></span>
      <span class="brand-sep"></span>
      <div class="brand-titles">
        <h1>Verbale Fotografico</h1>
        <p>Documentazione intervento</p>
      </div>
    </div>
    <div class="stamp">MODULO <b id="moduloStamp">VA</b><br>Nomenclatura conforme</div>
  </header>

  
  <div class="panel">
    <p class="panel-title">Foto verbale</p>

    <div class="capture-buttons">
      <button type="button" class="btn primary" id="btnCamera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        Scatta foto
      </button>
      <button type="button" class="btn" id="btnUpload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Carica foto
      </button>
    </div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <input type="file" id="fileInput" accept="image/*" multiple="">

    <div id="thumbWrap">
      <div class="empty-note">Nessuna foto aggiunta</div>
    </div>
  </div>

  
  <div class="panel">
    <p class="panel-title">Dati intervento</p>

    
    <div class="field">
      <label>Tipo documento</label>
      <div class="radio-group">
        <label>
          <input type="radio" name="tipoDoc" value="VA" checked="">
          CO (Ordine)
        </label>
        <label>
          <input type="radio" name="tipoDoc" value="VM">
          CM (Contratto Manutenzione)
        </label>
      </div>
    </div>

    <div class="field">
      <label for="cliente">Cliente</label>
      <input type="text" id="cliente" placeholder="es. ROSSI SPA" autocomplete="off">
    </div>

    <div class="field">
      <label for="co" id="labelCo">Numero ordine (CO)</label>
      <input type="text" id="co" class="mono" placeholder="es. 1300123456" inputmode="numeric" autocomplete="off">
      <p class="hint" id="coHint">Inserire il numero ordine completo</p>
    </div>

    <div class="field">
      <label for="tecnico">Cognome tecnico</label>
      <input type="text" id="tecnico" placeholder="es. BIANCHI" autocomplete="off">
    </div>

    <div class="field" style="margin-bottom:0;">
      <label for="data">Data intervento</label>
      <input type="date" id="data">
    </div>

    <div class="tag">
      <div class="tag-label">
        <span>Nome file PDF</span>
        <span id="tagStatus">—</span>
      </div>
      <div class="filename-row">
        <input type="text" id="filenameInput" class="mono" placeholder="Il nome verrà generato automaticamente..." autocomplete="off">
        <button type="button" class="btn secondary" id="btnRegen" title="Rigenera nome automatico">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:middle;margin-right:4px;"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          Rigenera
        </button>
      </div>
      <div class="tag-name" style="margin-top:10px;opacity:0.7;font-size:11px;">…</div>
    </div>
  </div>

  
  <div class="panel generate-row">
    <button type="button" class="btn primary" id="btnGenerate" disabled="">
      Genera PDF
    </button>
    <div class="status" id="status"></div>
  </div>

</div>

<footer>Elaborazione interamente locale nel browser · nessuna foto viene caricata su server esterni</footer>
